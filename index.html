</html><!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Pour toi 💖</title>

<style>
body {
  margin: 0;
  text-align: center;
  background: linear-gradient(135deg, #ffc0cb, #ff69b4);
  font-family: "Comic Sans MS", cursive;
  overflow: hidden;
}

/* الصورة */
img.main {
  width: 300px;
  border-radius: 20px;
  margin-top: 50px;
  box-shadow: 0 0 25px rgba(255,255,255,0.9);
  transition: 0.6s;
}

/* القطة الأيقونة */
.cat {
  width: 80px;
  cursor: pointer;
  margin-top: 20px;
  animation: breathe 2s infinite;
}

@keyframes breathe {
  0%,100% {transform: scale(1);}
  50% {transform: scale(1.1);}
}

.cat:active {
  transform: scale(1.3) rotate(10deg);
}

/* النص */
.message {
  color: white;
  font-size: 22px;
  margin-top: 10px;
}

/* سهم */
.arrow-svg {
  position: absolute;
  top: 360px;
  left: 50%;
  transform: translateX(-50%);
}

.arrow-text {
  fill: white;
  font-size: 18px;
}

/* قلوب */
.heart {
  position: absolute;
  font-size: 20px;
  animation: float 4s infinite;
}

@keyframes float {
  0% {opacity:0; transform: translateY(0) scale(0.5);}
  50% {opacity:1;}
  100% {opacity:0; transform: translateY(-200px) scale(1.5);}
}

/* القطط النهائية */
.kitty {
  width: 70px;
  margin: 8px;
  animation: bounce 2s infinite;
}

@keyframes bounce {
  0%,100% {transform: translateY(0);}
  50% {transform: translateY(-12px);}
}

@keyframes glow {
  from {box-shadow: 0 0 10px white;}
  to {box-shadow: 0 0 25px pink;}
}

</style>
</head>

<body>

<h2 style="color:white;">💖 Une petite surprise 💖</h2>

<img id="image" class="main" src="image1.jpg">

<div class="message" id="msg"></div>

<!-- القطة الأيقونة -->
<img src="icon1.png" class="cat" onclick="nextImage()" id="catIcon">

<!-- السهم -->
<svg class="arrow-svg" width="260" height="100">
  <path d="M10 50 Q 130 0 240 50" stroke="white" stroke-width="3" fill="none"/>
  <polygon points="240,50 225,40 225,60" fill="white"/>
  <text x="20" y="90" class="arrow-text">
    Cliquez ici, Mademoiselle
  </text>
</svg>

<audio id="song" src="song.mp3"></audio>
<audio id="meow" src="meow.mp3"></audio>

<script>
let images = ["image1.jpg", "image2.jpg", "image3.jpg"];
let index = 0;

function nextImage() {

  document.getElementById("meow").play();

  let cat = document.getElementById("catIcon");
  cat.style.transform = "scale(1.3)";

  setTimeout(() => {
    cat.style.transform = "scale(1)";
  }, 300);

  index++;

  if (index < images.length) {

    let img = document.getElementById("image");
    img.style.opacity = 0;

    setTimeout(() => {
      img.src = images[index];
      img.style.opacity = 1;
    }, 400);

    // الصورة الثانية
    if (index === 1) {
      document.getElementById("msg").innerText =
      "C'est ainsi que mes yeux te voient, ma belle 💕";
    }

    // الصورة الثالثة
    if (index === 2) {
      document.getElementById("msg").innerText = "";

      for (let i = 0; i < 20; i++) {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "💖";
        heart.style.left = Math.random() * window.innerWidth + "px";
        heart.style.top = "400px";
        document.body.appendChild(heart);
      }
    }

  } else {

    document.body.innerHTML = `
      <h2 style="color:white;">🎶 Pour toi 💖</h2>

      <img src="cover.jpg" style="
        width:250px;
        border-radius:20px;
        animation: glow 2s infinite alternate;
      ">

      <div style="margin-top:25px;">
        <img src="icon1.png" class="kitty">
        <img src="icon2.png" class="kitty">
        <img src="icon3.png" class="kitty">
      </div>
    `;

    document.getElementById("song").play();
  }
}
</script>

</body>
</html>
